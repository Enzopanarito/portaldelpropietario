name: Validate VLA

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Netlify function syntax
        run: find netlify/functions -maxdepth 1 -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run security and idempotency tests
        run: node tests/stage1-security.test.js
