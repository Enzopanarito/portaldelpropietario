name: Validate VLA

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - hardening-final-all-2026-07-11
      - fix-balance-pronto-pago-2026-07-11
      - fix-all-houses-pronto-pago-2026-07-11
      - fix-access-balance-engine-2026-07-11
      - fix-official-balances-all-portals-2026-07-11
      - fix-single-source-balances-2026-07-11

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies safely
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Check Netlify function syntax
        run: find netlify/functions -maxdepth 1 -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Check Edge Function syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --input-type=module --check < "$file"
          done < <(find netlify/edge-functions -maxdepth 1 -type f -name '*.js' -print0)

      - name: Validate generated browser scripts
        run: node tests/injected-browser-scripts.test.js

      - name: Validate protected payment approval
        run: node tests/admin-payment-flow.test.js

      - name: Validate centralized Airtable API counter
        run: node tests/api-usage-meter.test.js

      - name: Run security and idempotency tests
        run: node tests/stage1-security.test.js

      - name: Run audit cleanup preservation tests
        run: node tests/stage2-audit-cleanup.test.js

      - name: Run transactional monthly close tests
        run: node tests/stage3-monthly-close.test.js

      - name: Run final hardening tests
        run: node tests/final-hardening.test.js

      - name: Run unified balance and prompt-payment tests
        run: node tests/balance-engine-v4.test.js

      - name: Run protected visual breakdown tests
        run: node tests/visual-breakdown-v4.test.js

      - name: Audit all 15 current house balances
        run: node tests/all-houses-current-balance.test.js

      - name: Validate gate expired-debt calculations
        run: node tests/access-balance-engine.test.js

      - name: Validate official balances in all portals
        run: node tests/official-balance-sync.test.js

      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"
          if [ -f package-lock.json ]; then node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8'))"; fi
          node -e "JSON.parse(require('fs').readFileSync('release.json','utf8'))"

      - name: Scan for obvious committed secrets
        shell: bash
        run: |
          if grep -RIE --exclude-dir=.git --exclude-dir=.github --exclude-dir=node_modules --exclude='*.md' --exclude='package-lock.json' '(sk_live_[A-Za-z0-9]{16,}|pat[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----)' .; then
            echo 'Potential committed secret detected.'
            exit 1
          fi

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical
