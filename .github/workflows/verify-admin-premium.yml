name: Verify Admin Premium

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-admin-premium:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install production dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Validate admin premium structure
        run: node tests/admin-premium.test.js

      - name: Validate admin feature parity
        run: node tests/admin-feature-parity.test.js

      - name: Validate financial write lock coverage
        run: node tests/financial-write-lock-coverage.test.js

      - name: Validate immediate session revocation
        run: node tests/admin-auth-version.test.js

      - name: Validate legacy payment hashing
        run: node tests/monthly-close-legacy-hash.test.js

      - name: Run final hardening regression
        run: node tests/final-hardening.test.js

      - name: Check admin Edge syntax
        run: |
          node --input-type=module --check < netlify/edge-functions/admin-premium-assets.js
          node --input-type=module --check < netlify/edge-functions/admin-links.js
          node --input-type=module --check < netlify/edge-functions/admin-auth-version.js

      - name: Install Chromium
        run: |
          npm install --no-save --ignore-scripts playwright@1.53.0
          npx playwright install --with-deps chromium

      - name: Run isolated browser test
        run: node tests/admin-premium-browser.cjs

      - name: Upload visual and technical evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-premium-browser-evidence
          path: |
            admin-premium-desktop.png
            admin-premium-owners.png
            admin-premium-reports.png
            admin-premium-mobile.png
            admin-premium-result.json
            admin-premium-error.txt
            porton-state.json
            porton-session.png
            audit-state.json
            audit-session.png
          if-no-files-found: ignore
          retention-days: 14
