name: Regenerate Blobs Lockfile Temporary

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - '.github/workflows/regenerate-blobs-lock-temporary.yml'

permissions:
  contents: write

jobs:
  regenerate-lockfile:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate package lock without lifecycle scripts
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Verify only package-lock changed
        shell: bash
        run: |
          set -euo pipefail
          changes="$(git status --porcelain)"
          printf '%s\n' "$changes"
          [[ -n "$changes" ]]
          unexpected="$(printf '%s\n' "$changes" | awk '{print $2}' | grep -v '^package-lock.json$' || true)"
          [[ -z "$unexpected" ]]
          node -e "const lock=require('./package-lock.json'); if(lock.packages[''].dependencies['@netlify/blobs'] !== '^10.7.9') process.exit(1); const installed=lock.packages['node_modules/@netlify/blobs']?.version; if(!installed || !installed.startsWith('10.')) process.exit(1);"

      - name: Commit lockfile to source branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'Actualizar lockfile para Netlify Blobs 10'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
