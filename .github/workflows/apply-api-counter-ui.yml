name: Apply API Counter UI

on:
  push:
    branches:
      - hardening-remove-legacy-writes-2026-07-12

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hardening-remove-legacy-writes-2026-07-12
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Replace silent API counter UI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('admin.html'); s=p.read_text('utf-8')
          s=s.replace("<p class='text-sm text-slate-500'>API</p>","<p class='text-sm text-slate-500'>Airtable API</p>")
          new="""async function loadUsage(){const k=document.getElementById('kpi-api'),note=document.getElementById('api-restan'),bar=document.getElementById('api-bar');k.textContent='Cargando...';note.textContent='Leyendo contador guardado en Airtable';bar.style.width='0%';try{const d=await adminFetch('/.netlify/functions/api-usage');k.textContent=d.limit?`${d.total}/${d.limit}`:`${d.total} llamadas`;note.textContent=d.limit?`Restan ${d.remaining} · ${d.exact?'medición exacta':'medición incompleta'}`:`${d.exact?'Medición exacta interna':'Medición incompleta'}${d.coverageStart?' desde '+new Date(d.coverageStart).toLocaleString('es-VE'):''}`;bar.style.width=(d.percent==null?0:d.percent)+'%';bar.title=d.note||'';if(!d.exact)throw new Error(d.detail||d.note||'El contador no pudo verificarse.')}catch(e){k.textContent='Error';note.textContent=e.message||'No se pudo consultar el contador';bar.style.width='0%';toast('Contador API: '+(e.message||'error de lectura'),true)}}"""
          s,n=re.subn(r"async function loadUsage\(\)\{[\s\S]*?\}\nasync function loadHealth",new+"\nasync function loadHealth",s,count=1)
          if n!=1: raise SystemExit(f'loadUsage matches={n}')
          p.write_text(s,'utf-8')
          PY
      - name: Validate browser script
        run: |
          node tests/injected-browser-scripts.test.js
          grep -F "Medición exacta interna" admin.html
          ! grep -F "async function loadUsage(){try" admin.html
      - name: Commit UI fix
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add admin.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Mostrar contador Airtable verificable y errores visibles'
          git push origin HEAD:hardening-remove-legacy-writes-2026-07-12
