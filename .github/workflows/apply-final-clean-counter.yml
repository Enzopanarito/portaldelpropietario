name: Apply Final Clean Counter

on:
  push:
    branches:
      - fix-final-clean-counter-2026-07-12
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-final-clean-counter-2026-07-12
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Remove accidental dependency files and import reviewed source
        shell: bash
        run: |
          set -euo pipefail
          git rm -r --cached --ignore-unmatch node_modules || true
          rm -rf node_modules
          git fetch origin hardening-system-clean-api-meter-2026-07-12
          rm -rf netlify/functions netlify/edge-functions tests
          git archive origin/hardening-system-clean-api-meter-2026-07-12 \
            admin.html netlify/functions netlify/edge-functions tests .github/workflows/validate.yml | tar -x
          rm -f .github/workflows/scan-airtable-calls.yml
          rm -f scripts/scan-airtable-calls.js
          rm -f audit/NO_MORE_AUTOMATION.md audit/stop-auto-workflows.txt
      - name: Install dependencies safely
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Validate final source
        shell: bash
        run: |
          set -euo pipefail
          test ! -e netlify/functions/_airtable_usage_meter.js
          test -e netlify/functions/_airtable_meter.js
          find netlify/functions -maxdepth 1 -type f -name '*.js' -print0 | xargs -0 -n1 node --check
          while IFS= read -r -d '' file; do node --input-type=module --check < "$file"; done < <(find netlify/edge-functions -maxdepth 1 -type f -name '*.js' -print0)
          node tests/injected-browser-scripts.test.js
          node tests/admin-payment-flow.test.js
          node tests/api-usage-meter.test.js
          node tests/stage1-security.test.js
          node tests/stage2-audit-cleanup.test.js
          node tests/stage3-monthly-close.test.js
          node tests/final-hardening.test.js
          node tests/balance-engine-v4.test.js
          node tests/visual-breakdown-v4.test.js
          node tests/all-houses-current-balance.test.js
          node tests/access-balance-engine.test.js
          node tests/official-balance-sync.test.js
          npm audit --omit=dev --audit-level=critical
      - name: Commit only functional source
        shell: bash
        run: |
          rm -rf node_modules
          git restore package.json package-lock.json 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -u
          git add admin.html netlify/functions netlify/edge-functions tests .github/workflows/validate.yml
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Finalizar saneamiento y contador confiable de Airtable'
          git push origin HEAD:fix-final-clean-counter-2026-07-12
