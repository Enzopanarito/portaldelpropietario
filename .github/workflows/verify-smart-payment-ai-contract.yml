name: Verify Smart Payment AI Contract

on:
  pull_request:
    branches: [main]
    paths:
      - 'config/payment-proof-analysis-v2.schema.json'
      - 'netlify/functions/_payment_ai_contract.js'
      - 'tests/payment-ai-contract.test.js'
      - '.github/workflows/verify-smart-payment-ai-contract.yml'
  push:
    branches: [main]
    paths:
      - 'config/payment-proof-analysis-v2.schema.json'
      - 'netlify/functions/_payment_ai_contract.js'
      - 'tests/payment-ai-contract.test.js'
      - '.github/workflows/verify-smart-payment-ai-contract.yml'

permissions:
  contents: read

jobs:
  verify-ai-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check syntax and schema JSON
        run: |
          node --check netlify/functions/_payment_ai_contract.js
          node --check tests/payment-ai-contract.test.js
          node -e "JSON.parse(require('fs').readFileSync('config/payment-proof-analysis-v2.schema.json','utf8'))"

      - name: Verify strict extraction contract and fallback policy
        run: node tests/payment-ai-contract.test.js

      - name: Re-run secure proof core
        run: |
          node tests/payment-proof-core.test.js
          node tests/payment-proof-store.test.js
          node tests/payment-access-snapshot.test.js
          node tests/payment-duplicate-core.test.js

      - name: Re-run Airtable V2 migration contracts
        run: node tests/smart-payment-airtable-migration.test.js

      - name: Re-run official balance synchronization
        run: node tests/official-balance-sync.test.js

      - name: Re-run all 15 official balances
        run: node tests/all-houses-current-balance.test.js
