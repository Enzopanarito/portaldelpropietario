name: Export Hardening Parts

on:
  push:
    branches:
      - full-system-hardening-2026-07-12
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: full-system-hardening-2026-07-12
      - uses: actions/upload-artifact@v4
        with:
          name: hardening-parts
          path: .hardening/*.patch
          include-hidden-files: true
          retention-days: 2
