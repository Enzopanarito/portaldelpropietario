name: Diagnose Public Snapshot Production

on:
  pull_request:
    branches: [main]
    paths:
      - 'tests/public-snapshot-production-smoke.cjs'
      - '.github/workflows/diagnose-public-snapshot-production.yml'
      - 'netlify/functions/public-data-v3.js'
      - 'netlify/functions/_public_snapshot_store.js'

permissions:
  contents: read

jobs:
  diagnose-production-readonly:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Probe production snapshot without writes outside normal GET behavior
        env:
          PUBLIC_SNAPSHOT_MAX_ATTEMPTS: '8'
          PUBLIC_SNAPSHOT_DELAY_MS: '3000'
        shell: bash
        run: |
          set -o pipefail
          node tests/public-snapshot-production-smoke.cjs 2>&1 | tee public-snapshot-diagnostic.log

      - name: Upload compact diagnosis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-snapshot-production-diagnostic
          path: public-snapshot-diagnostic.log
          if-no-files-found: error
          retention-days: 7
