name: Apply Full System Hardening

on:
  push:
    branches:
      - full-system-hardening-2026-07-12
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact hardening branch
        uses: actions/checkout@v4
        with:
          ref: full-system-hardening-2026-07-12
          fetch-depth: 0

      - name: Apply audited patches
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .hardening/part-00.patch \
            .hardening/part-01.patch \
            .hardening/part-02.patch \
            .hardening/part-03.patch \
            .hardening/part-04.patch \
            .hardening/part-05.patch \
            .hardening/part-06.patch \
            .hardening/part-07.patch \
            .hardening/part-08.patch \
            .hardening/part-09.patch \
            .hardening/part-10a.patch \
            .hardening/part-10b.patch \
            .hardening/part-11.patch \
            .hardening/part-12.patch \
            .hardening/part-13.patch \
            .hardening/part-14a.patch \
            .hardening/part-14b.patch \
            .hardening/part-14c.patch \
            > /tmp/full-system-hardening.patch
          git apply --check /tmp/full-system-hardening.patch
          git apply /tmp/full-system-hardening.patch

      - name: Install dependencies safely
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Validate all server and browser code
        shell: bash
        run: |
          set -euo pipefail
          find netlify/functions -maxdepth 1 -type f -name '*.js' -print0 | xargs -0 -n1 node --check
          while IFS= read -r -d '' file; do
            node --input-type=module --check < "$file"
          done < <(find netlify/edge-functions -maxdepth 1 -type f -name '*.js' -print0)
          python3 -m py_compile local-whatsapp-agent/whatsapp_agent.py
          node tests/injected-browser-scripts.test.js
          node tests/admin-payment-flow.test.js
          node tests/auth-version.test.js
          node tests/receipt-idempotency.test.js
          node tests/whatsapp-hardening.test.js
          node tests/stage1-security.test.js
          node tests/stage2-audit-cleanup.test.js
          node tests/stage3-monthly-close.test.js
          node tests/final-hardening.test.js
          node tests/full-system-hardening.test.js
          node tests/balance-engine-v4.test.js
          node tests/visual-breakdown-v4.test.js
          node tests/all-houses-current-balance.test.js
          node tests/access-balance-engine.test.js
          node tests/official-balance-sync.test.js

      - name: Ensure financial fixtures remain unchanged
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- tests/fixtures/official-balances-2026-07-11.json
          git diff --exit-code -- official-balances.js
          git diff --exit-code -- netlify/functions/_official_balances.js

      - name: Commit only verified functional changes
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .hardening
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows/apply-full-hardening.yml
          git commit -m "Aplicar endurecimiento integral verificado"
          git push origin HEAD:full-system-hardening-2026-07-12
