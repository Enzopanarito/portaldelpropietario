name: Diagnose Live Production

on:
  push:
    branches:
      - diagnose-live-production-2026-07-11
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for production v6
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            headers="$(curl --silent --show-error --location --dump-header - --output /dev/null --max-time 30 "https://villalosapamates.netlify.app/?verify=${GITHUB_RUN_ID}-${attempt}" 2>/dev/null || true)"
            marker="$(printf '%s' "$headers" | awk -F': ' 'tolower($1)=="x-vla-breakdown-presentation"{gsub("\r","");print $2}' | tail -1)"
            if [ "$marker" = "2026-07-11-photo-v6" ]; then
              echo "Production v6 available."
              exit 0
            fi
            echo "Attempt $attempt: marker=${marker:-missing}"
            sleep 10
          done
          exit 1

      - name: Install Playwright Chromium
        run: |
          npm install --no-save --ignore-scripts playwright@1.53.0
          npx playwright install --with-deps chromium

      - name: Verify the public production portal
        shell: bash
        run: |
          cat > diagnose-live.cjs <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const expected = {
            1:85, 2:0, 3:157.07, 4:306.40, 5:85, 6:0, 7:85, 8:85,
            9:-20, 10:298.17, 11:-378.89, 12:109.99, 13:298.17, 14:-50, 15:186.90
          };

          function parseMoney(text) {
            const raw = String(text || '').trim();
            const negative = raw.startsWith('-') || /saldo a favor/i.test(raw);
            const value = Number(raw.replace(/[^0-9.]/g, '')) || 0;
            return negative ? -value : value;
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 390, height: 844 } });
            const pageErrors = [];
            page.on('pageerror', error => pageErrors.push(String(error.stack || error.message || error)));

            const url = `https://villalosapamates.netlify.app/?productionBrowser=${Date.now()}`;
            const response = await page.goto(url, { waitUntil: 'networkidle', timeout: 60000 });
            const headers = response ? await response.allHeaders() : {};

            await page.waitForFunction(() => {
              const select = document.getElementById('welcomeSelector');
              return select && Array.from(select.options).some(option => option.value);
            }, null, { timeout: 30000 });

            const welcome = page.locator('#welcomeSelector');
            const firstValue = await welcome.locator('option').evaluateAll(options => {
              const item = options.find(option => String(option.textContent || '').trim().startsWith('Casa 1 -')) || options.find(option => option.value);
              return item ? item.value : '';
            });
            if (!firstValue) throw new Error('No se encontró la Casa 1.');
            await welcome.selectOption(firstValue);
            await page.getByRole('button', { name: /Consultar Estado de Cuenta/i }).click();

            const breakdown = page.locator('[data-vla-breakdown-host="2026-07-11-photo-v6"]');
            await breakdown.waitFor({ state: 'visible', timeout: 30000 });
            const breakdownText = await breakdown.innerText();
            if (!/Costo\s*Total/i.test(breakdownText)) throw new Error('No aparece Costo Total.');
            if (!/Su\s*Parte/i.test(breakdownText)) throw new Error('No aparece Su Parte.');
            if (!/VIGILANCIA/i.test(breakdownText)) throw new Error('No aparece VIGILANCIA.');
            if (/Recargo 10% por pérdida del pronto pago/i.test(breakdownText)) throw new Error('Aparece el recargo prohibido.');

            const balances = {};
            const selector = page.locator('#userSelector');
            for (const house of Object.keys(expected).map(Number)) {
              const value = await selector.locator('option').evaluateAll((options, houseNumber) => {
                const item = options.find(option => String(option.textContent || '').trim().startsWith(`Casa ${houseNumber} -`));
                return item ? item.value : '';
              }, house);
              if (!value) throw new Error(`No se encontró la Casa ${house}.`);
              await selector.selectOption(value);
              await page.waitForTimeout(250);
              const shown = parseMoney(await page.locator('#m-total').innerText());
              balances[house] = shown;
              if (Math.abs(shown - expected[house]) > 0.009) throw new Error(`Casa ${house}: ${shown} en vez de ${expected[house]}.`);
            }

            if (pageErrors.length) throw new Error(`Errores JavaScript: ${pageErrors.join(' | ')}`);

            const result = {
              url,
              status: response ? response.status() : null,
              productionMarker: headers['x-vla-breakdown-presentation'] || null,
              breakdownVisible: true,
              hasCostoTotal: true,
              hasSuParte: true,
              hasVigilancia: true,
              forbiddenRecargoVisible: false,
              balances,
              pageErrors
            };
            fs.writeFileSync('live-production-result.json', JSON.stringify(result, null, 2));
            await page.screenshot({ path: 'live-production.png', fullPage: true });
            console.log(JSON.stringify(result, null, 2));
            await browser.close();
          })().catch(error => {
            fs.writeFileSync('live-production-error.txt', String(error.stack || error));
            console.error(error.stack || error);
            process.exit(1);
          });
          NODE
          node diagnose-live.cjs

      - name: Upload production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-production-diagnostic
          path: |
            live-production-result.json
            live-production-error.txt
            live-production.png
          if-no-files-found: ignore
          retention-days: 7
