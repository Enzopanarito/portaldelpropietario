name: Verify Pending Report Access Safety

on:
  pull_request:
    branches: [main]
    paths:
      - 'netlify/functions/public-report-payment.js'
      - 'netlify/functions/_access_control.js'
      - 'netlify/functions/_pending_report_access_policy.js'
      - 'tests/pending-reports-never-enable-access.test.js'
      - '.github/workflows/verify-pending-report-access-safety.yml'
  push:
    branches: [main]
    paths:
      - 'netlify/functions/public-report-payment.js'
      - 'netlify/functions/_access_control.js'
      - 'netlify/functions/_pending_report_access_policy.js'
      - 'tests/pending-reports-never-enable-access.test.js'
      - '.github/workflows/verify-pending-report-access-safety.yml'

permissions:
  contents: read

jobs:
  verify-pending-report-access-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check syntax
        run: |
          node --check netlify/functions/public-report-payment.js
          node --check netlify/functions/_access_control.js
          node --check netlify/functions/_pending_report_access_policy.js
          node --check tests/pending-reports-never-enable-access.test.js

      - name: Prove pending reports never enable access
        run: node tests/pending-reports-never-enable-access.test.js

      - name: Re-run payment report intelligence
        run: node tests/payment-report-intelligence.test.js

      - name: Re-run secure payment core
        run: |
          node tests/payment-proof-core.test.js
          node tests/payment-proof-store.test.js
          node tests/payment-access-snapshot.test.js
          node tests/payment-duplicate-core.test.js
          node tests/payment-ai-contract.test.js

      - name: Re-run official balance synchronization
        run: node tests/official-balance-sync.test.js

      - name: Re-run all 15 official balances
        run: node tests/all-houses-current-balance.test.js
