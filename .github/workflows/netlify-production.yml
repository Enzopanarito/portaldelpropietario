name: Deploy Netlify Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NETLIFY_AUTH_TOKEN_PRIMARY: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_AUTH_TOKEN_FALLBACK: ${{ secrets.NETLIFY_TOKEN }}
      NETLIFY_SITE_ID_PRIMARY: ${{ secrets.NETLIFY_SITE_ID }}
      NETLIFY_SITE_ID_FALLBACK: ${{ secrets.NETLIFY_SITE_ID_VILLALOSAPAMATES }}
    steps:
      - name: Checkout exact production commit
        uses: actions/checkout@v4

      - name: Resolve Netlify credentials safely
        id: credentials
        shell: bash
        run: |
          AUTH_TOKEN="${NETLIFY_AUTH_TOKEN_PRIMARY:-${NETLIFY_AUTH_TOKEN_FALLBACK:-}}"
          SITE_ID="${NETLIFY_SITE_ID_PRIMARY:-${NETLIFY_SITE_ID_FALLBACK:-}}"
          if [ -n "$AUTH_TOKEN" ]; then echo "::add-mask::$AUTH_TOKEN"; fi
          if [ -n "$SITE_ID" ]; then echo "::add-mask::$SITE_ID"; fi
          if [ -z "$AUTH_TOKEN" ] || [ -z "$SITE_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "NETLIFY_AUTH_TOKEN=$AUTH_TOKEN" >> "$GITHUB_ENV"
          echo "NETLIFY_SITE_ID=$SITE_ID" >> "$GITHUB_ENV"

      - name: Inspect Netlify production configuration
        id: site
        if: steps.credentials.outputs.ready == 'true'
        shell: bash
        run: |
          site_json="$(curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "User-Agent: VLA-GitHub-Actions" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID")"
          production_branch="$(printf '%s' "$site_json" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s);process.stdout.write(String(j.build_settings?.repo_branch||j.repo?.branch||'unknown'))})")"
          repo_url="$(printf '%s' "$site_json" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s);process.stdout.write(String(j.build_settings?.repo_url||j.repo?.repo_path||'connected'))})")"
          echo "production_branch=$production_branch" >> "$GITHUB_OUTPUT"
          echo "Production branch: $production_branch"
          echo "Repository connection: $repo_url"

      - name: Trigger server-side production build
        id: trigger
        if: steps.site.outcome == 'success'
        shell: bash
        run: |
          build_json="$(curl --fail-with-body --silent --show-error --request POST \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "User-Agent: VLA-GitHub-Actions" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/builds?clear_cache=true")"
          build_id="$(printf '%s' "$build_json" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s);process.stdout.write(String(j.id||j.build_id||''))})")"
          if [ -z "$build_id" ]; then
            echo "Netlify did not return a build ID."
            exit 1
          fi
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"
          echo "Server-side production build triggered: $build_id"

      - name: Verify production release and breakdown marker
        id: verify
        if: steps.trigger.outcome == 'success'
        env:
          BUILD_ID: ${{ steps.trigger.outputs.build_id }}
        shell: bash
        run: |
          for attempt in $(seq 1 90); do
            if body="$(curl --fail --silent --show-error --location --max-time 30 \
              "https://villalosapamates.netlify.app/release.json?run=$GITHUB_RUN_ID&attempt=$attempt" 2>/dev/null)"; then
              if printf '%s' "$body" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s);if(j.release!=='2026-07-11-v6'||j.expectedHouses!==15||j.breakdownPresentation!=='2026-07-11-photo-v6')process.exit(1)})"; then
                echo "Production verified: release 2026-07-11-v6, 15 houses, visual breakdown 2026-07-11-photo-v6."
                exit 0
              fi
            fi

            build_json="$(curl --fail --silent --show-error \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              -H "User-Agent: VLA-GitHub-Actions" \
              "https://api.netlify.com/api/v1/builds/$BUILD_ID" 2>/dev/null || true)"
            if [ -n "$build_json" ]; then
              build_state="$(printf '%s' "$build_json" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s);process.stdout.write(String(j.state||(j.done?'done':'pending')))})")"
              build_error="$(printf '%s' "$build_json" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s);const e=j.error;process.stdout.write(e?String(e):'')})")"
              echo "Attempt $attempt: Netlify build state $build_state"
              if [ -n "$build_error" ]; then
                echo "Netlify build error: $build_error"
                exit 1
              fi
            fi
            sleep 10
          done
          echo "Production did not expose the expected visual breakdown marker before timeout."
          exit 1

      - name: Report deployment result on PR 26
        if: always()
        uses: actions/github-script@v7
        env:
          CREDENTIALS_READY: ${{ steps.credentials.outputs.ready }}
          SITE_OUTCOME: ${{ steps.site.outcome }}
          TRIGGER_OUTCOME: ${{ steps.trigger.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          PRODUCTION_BRANCH: ${{ steps.site.outputs.production_branch }}
          BUILD_ID: ${{ steps.trigger.outputs.build_id }}
        with:
          script: |
            const ready = process.env.CREDENTIALS_READY === 'true';
            const triggered = process.env.TRIGGER_OUTCOME === 'success';
            const verified = process.env.VERIFY_OUTCOME === 'success';
            const branch = process.env.PRODUCTION_BRANCH || 'unknown';
            const buildId = process.env.BUILD_ID || 'not returned';
            let body;
            if (!ready) {
              body = `### Producción Netlify bloqueada\n\nLos secretos de Netlify no están disponibles para el flujo. No se modificó producción.\n\nCommit: \`${context.sha}\` · [Ejecución](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            } else if (triggered && verified) {
              body = `### Desglose visual v6 publicado y verificado ✅\n\nNetlify confirmó la versión \`2026-07-11-v6\`, las 15 casas y el desglose visual \`2026-07-11-photo-v6\`. La comprobación final en navegador se ejecuta después de este flujo.\n\nRama de producción: \`${branch}\` · Build: \`${buildId}\` · Commit del flujo: \`${context.sha}\` · [Ejecución](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            } else {
              body = `### Desglose visual de producción no verificado ⚠️\n\nRama de producción: \`${branch}\`. Build: \`${buildId}\`. Disparo: \`${process.env.TRIGGER_OUTCOME || 'no ejecutado'}\`. Verificación: \`${process.env.VERIFY_OUTCOME || 'no ejecutada'}\`.\n\nCommit: \`${context.sha}\` · [Ejecución](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 26,
              body
            });
