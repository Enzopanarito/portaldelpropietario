name: Verify Clean Production

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-production:
    if: github.event.pull_request.head.ref == 'verify-production-clean-system-2026-07-12'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for centralized Airtable meter in production
        shell: bash
        run: |
          set -euo pipefail
          base='https://villalosapamates.netlify.app'
          for attempt in $(seq 1 90); do
            curl -sS -L -D /tmp/public-headers -o /tmp/public.json --max-time 60 "$base/.netlify/functions/public-data?production-audit=$GITHUB_RUN_ID-$attempt" || true
            source="$(awk -F': ' 'tolower($1)=="x-airtable-usage-source"{gsub("\r","");print $2}' /tmp/public-headers | tail -1)"
            logged="$(awk -F': ' 'tolower($1)=="x-airtable-usage-logged"{gsub("\r","");print $2}' /tmp/public-headers | tail -1)"
            houses="$(node -e "try{const d=JSON.parse(require('fs').readFileSync('/tmp/public.json','utf8'));process.stdout.write(String((d.propietarios||[]).length))}catch(e){process.stdout.write('0')}" )"
            echo "Attempt $attempt: source=${source:-missing} logged=${logged:-missing} houses=$houses"
            if [ "$source" = 'public-data-v2' ] && [ "$logged" = 'recorded' ] && [ "$houses" = '15' ]; then
              cp /tmp/public-headers production-public-headers.txt
              cp /tmp/public.json production-public-data.json
              exit 0
            fi
            sleep 10
          done
          echo 'El medidor central no apareció en producción.'
          exit 1

      - name: Verify clean administrative source in production
        shell: bash
        run: |
          set -euo pipefail
          base='https://villalosapamates.netlify.app'
          curl -sS -L -D production-admin-headers.txt "$base/admin.html?production-audit=$GITHUB_RUN_ID" -o production-admin.html
          grep -Fq '/.netlify/functions/admin-manual-payment' production-admin.html
          grep -Fq '/.netlify/functions/admin-expense' production-admin.html
          grep -Fq '/.netlify/functions/process-payment-report' production-admin.html
          grep -Fq '/.netlify/functions/api-usage' production-admin.html
          grep -Fq 'interno auditado' production-admin.html
          ! grep -Fq "/.netlify/functions/airtable/'+encodeURIComponent(TABLE_PAGOS)" production-admin.html
          ! grep -Fq "/.netlify/functions/airtable/'+encodeURIComponent(TABLE_REPORTES)" production-admin.html
          ! grep -Fq "/.netlify/functions/airtable/'+encodeURIComponent(TABLE_GASTOS)" production-admin.html
          ! grep -Fq 'catch(e){}' production-admin.html

      - name: Verify protected endpoints reject unauthenticated writes
        shell: bash
        run: |
          set -euo pipefail
          base='https://villalosapamates.netlify.app'
          : > production-protected-endpoints.txt
          for path in process-payment-report admin-manual-payment admin-expense monthly-close mkj-access resend-receipt send-receipt; do
            code="$(curl -sS -L -o /tmp/body -w '%{http_code}' --max-time 30 -X POST -H 'Content-Type: application/json' -d '{}' "$base/.netlify/functions/$path")"
            echo "$path $code" | tee -a production-protected-endpoints.txt
            test "$code" = '401' -o "$code" = '403'
          done

      - name: Install Playwright Chromium
        run: |
          npm install --no-save --ignore-scripts playwright@1.53.0
          npx playwright install --with-deps chromium

      - name: Verify owner portal and all 15 live balances
        shell: bash
        run: |
          cat > verify-production.cjs <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');
          function parseMoney(text){const raw=String(text||'').trim();const negative=raw.startsWith('-')||/saldo a favor/i.test(raw);const value=Number(raw.replace(/[^0-9.]/g,''))||0;return negative?-value:value}
          (async()=>{
            const base='https://villalosapamates.netlify.app';
            const browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:390,height:844}});
            const pageErrors=[];page.on('pageerror',e=>pageErrors.push(String(e.stack||e.message||e)));
            const sourceResponse=await page.request.get(`${base}/.netlify/functions/public-data?browser-production=${Date.now()}`,{timeout:60000});
            if(!sourceResponse.ok())throw new Error(`Fuente pública ${sourceResponse.status()}`);
            const source=await sourceResponse.json();const expected={};
            for(const owner of source.propietarios||[]){const house=Number(owner.Casa),balance=Number(owner['Saldo Total Actual']);if(Number.isFinite(house)&&Number.isFinite(balance))expected[house]=balance}
            if(Object.keys(expected).length!==15)throw new Error(`Fuente oficial devolvió ${Object.keys(expected).length} casas`);
            await page.goto(`${base}/?production-browser=${Date.now()}`,{waitUntil:'networkidle',timeout:60000});
            await page.waitForFunction(()=>{const s=document.getElementById('welcomeSelector')||document.querySelector('select');return s&&Array.from(s.options).some(o=>o.value)},null,{timeout:30000});
            const welcome=page.locator('#welcomeSelector');
            const first=await welcome.locator('option').evaluateAll(options=>{const item=options.find(o=>String(o.textContent||'').trim().startsWith('Casa 1 -'))||options.find(o=>o.value);return item?item.value:''});
            await welcome.selectOption(first);await page.getByRole('button',{name:/Consultar Estado de Cuenta/i}).click();
            const breakdown=page.locator('[data-vla-breakdown-host="2026-07-11-photo-v6"]');await breakdown.waitFor({state:'visible',timeout:30000});
            const breakdownText=await breakdown.innerText();
            if(!/Costo\s*Total/i.test(breakdownText)||!/Su\s*Parte/i.test(breakdownText)||!/VIGILANCIA/i.test(breakdownText))throw new Error('Desglose incompleto');
            if(/Recargo 10% por pérdida del pronto pago/i.test(breakdownText))throw new Error('Recargo prohibido visible');
            const selector=page.locator('#userSelector'),balances={};
            for(const house of Object.keys(expected).map(Number).sort((a,b)=>a-b)){
              const value=await selector.locator('option').evaluateAll((options,n)=>{const item=options.find(o=>String(o.textContent||'').trim().startsWith(`Casa ${n} -`));return item?item.value:''},house);
              if(!value)throw new Error(`Casa ${house} ausente`);await selector.selectOption(value);await page.waitForTimeout(250);
              const shown=parseMoney(await page.locator('#m-total').innerText());balances[house]=shown;
              if(Math.abs(shown-expected[house])>0.009)throw new Error(`Casa ${house}: ${shown} != ${expected[house]}`);
            }
            if(pageErrors.length)throw new Error(`Errores JS: ${pageErrors.join(' | ')}`);
            const result={target:base,verifiedAt:new Date().toISOString(),houses:Object.keys(expected).length,breakdownVisible:true,expected,balances,pageErrors};
            fs.writeFileSync('production-browser-result.json',JSON.stringify(result,null,2));
            await page.screenshot({path:'production-browser.png',fullPage:true});
            console.log(JSON.stringify(result,null,2));await browser.close();
          })().catch(error=>{fs.writeFileSync('production-browser-error.txt',String(error.stack||error));console.error(error.stack||error);process.exit(1)});
          NODE
          node verify-production.cjs

      - name: Upload production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-production-evidence
          path: |
            production-public-headers.txt
            production-public-data.json
            production-admin-headers.txt
            production-admin.html
            production-protected-endpoints.txt
            production-browser-result.json
            production-browser-error.txt
            production-browser.png
          if-no-files-found: ignore
          retention-days: 14
