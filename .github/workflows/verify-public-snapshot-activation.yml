name: Verify Public Snapshot Activation

on:
  pull_request:
    branches: [main]
    paths:
      - 'netlify.toml'
      - 'tests/public-snapshot-activation.test.js'
      - 'tests/public-snapshot-production-smoke.cjs'
      - '.github/workflows/verify-public-snapshot-activation.yml'
  push:
    branches: [main]
    paths:
      - 'netlify.toml'
      - 'tests/public-snapshot-activation.test.js'
      - 'tests/public-snapshot-production-smoke.cjs'
      - '.github/workflows/verify-public-snapshot-activation.yml'

permissions:
  contents: read
  statuses: write

jobs:
  activation-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check activation scripts
        run: |
          node --check tests/public-snapshot-activation.test.js
          node --check tests/public-snapshot-production-smoke.cjs

      - name: Verify production-only activation and rollback
        run: node tests/public-snapshot-activation.test.js

      - name: Re-run snapshot CAS protection
        run: node tests/public-snapshot-store.test.js

      - name: Re-run public fallback routes
        run: node tests/public-data-v3.test.js

  production-smoke:
    if: github.event_name == 'push'
    needs: activation-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish pending status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "$(jq -nc --arg state pending --arg context 'VLA Public Snapshot Production Smoke' --arg description 'Esperando despliegue y verificando REFRESH/HIT' --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" '{state:$state,context:$context,description:$description,target_url:$target_url}')"

      - name: Wait for deploy and verify REFRESH then HIT
        id: smoke
        continue-on-error: true
        run: node tests/public-snapshot-production-smoke.cjs

      - name: Publish final status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          description='El smoke productivo del caché falló'
          if [[ "${SMOKE_OUTCOME}" == "success" ]]; then
            state=success
            description='HIT confirmado con 15 casas y 0 llamadas Airtable'
          fi
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "$(jq -nc --arg state "${state}" --arg context 'VLA Public Snapshot Production Smoke' --arg description "${description}" --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" '{state:$state,context:$context,description:$description,target_url:$target_url}')"

      - name: Enforce smoke result
        if: steps.smoke.outcome != 'success'
        run: exit 1
