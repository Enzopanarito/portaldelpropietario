name: Verify Smart Payment Airtable Migration

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/smart-payment-airtable-migrate.js'
      - 'tests/smart-payment-airtable-migration.test.js'
      - 'config/smart-payment-schema-v2.json'
      - '.github/workflows/verify-smart-payment-airtable-migration.yml'

permissions:
  contents: read

jobs:
  verify-idempotent-migration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check syntax
        run: |
          node --check scripts/smart-payment-airtable-migrate.js
          node --check tests/smart-payment-airtable-migration.test.js

      - name: Verify guards, idempotency and rollback ledger
        run: node tests/smart-payment-airtable-migration.test.js

      - name: Re-run phase 1 schema contracts
        run: node tests/smart-payment-phase1-schema.test.js
