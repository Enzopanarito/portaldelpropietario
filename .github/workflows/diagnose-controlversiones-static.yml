name: Diagnose ControlVersiones Static Contract

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-controlversiones-static.yml'

permissions:
  contents: read

jobs:
  locate-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate exact workflow command and test
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '=== WORKFLOW STEP ==='
            grep -R -n -B 3 -A 5 "Validate permanent ControlVersiones storage mode" .github/workflows || true
            echo '=== TEST CANDIDATES ==='
            grep -R -n -B 4 -A 12 "CONTROLVERSIONES\|ControlVersiones storage\|permanent.*storage\|PERMANENT" tests netlify/functions | head -n 400 || true
          } | tee controlversiones-static-diagnostic.txt

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: controlversiones-static-diagnostic
          path: controlversiones-static-diagnostic.txt
          if-no-files-found: error
          retention-days: 7
