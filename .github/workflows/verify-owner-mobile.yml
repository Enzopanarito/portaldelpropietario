name: Verify Owner Mobile

on:
  pull_request:
    branches: [main]
  workflow_run:
    workflows: ["Deploy Netlify Production"]
    types: [completed]

permissions:
  contents: read
  statuses: write

jobs:
  verify-owner-mobile:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static mobile recovery
        run: |
          node tests/owner-mobile-v2.test.js
          node tests/owner-dark-contrast.test.js

      - name: Validate smart payment report structure
        run: |
          node tests/payment-report-intelligence.test.js
          node tests/payment-report-attachment.test.js
          node tests/owner-payment-report-v3.test.js
          node tests/public-report-payment-smart.test.js

      - name: Resolve target URL
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "url=https://deploy-preview-${{ github.event.pull_request.number }}--villalosapamates.netlify.app" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://villalosapamates.netlify.app" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for mobile, payment and dark contrast release
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            headers="$(curl --silent --show-error --location --dump-header - --output /tmp/owner.html --max-time 30 "${TARGET_URL}/?owner-mobile-release=${GITHUB_RUN_ID}-${attempt}" 2>/dev/null || true)"
            marker="$(printf '%s' "$headers" | awk -F': ' 'tolower($1)=="x-vla-owner-mobile"{gsub("\r","");print $2}' | tail -1)"
            payment_marker="$(printf '%s' "$headers" | awk -F': ' 'tolower($1)=="x-vla-owner-payment-report"{gsub("\r","");print $2}' | tail -1)"
            dark_marker="$(printf '%s' "$headers" | awk -F': ' 'tolower($1)=="x-vla-owner-dark-contrast"{gsub("\r","");print $2}' | tail -1)"
            ready=1
            [ "$marker" = "fluid-v2" ] || ready=0
            [ "$payment_marker" = "smart-v3" ] || ready=0
            [ "$dark_marker" = "wcag-v1" ] || ready=0
            grep -q 'owner-payment-report-v3.css' /tmp/owner.html 2>/dev/null || ready=0
            grep -q 'owner-dark-contrast-v1.css' /tmp/owner.html 2>/dev/null || ready=0
            grep -q 'owner-payment-report-v3.js' /tmp/owner.html 2>/dev/null || ready=0
            grep -q 'payment-report-intelligence.js' /tmp/owner.html 2>/dev/null || ready=0
            for asset in owner-mobile-v2.css owner-payment-report-v3.css owner-dark-contrast-v1.css owner-payment-report-v3.js payment-report-intelligence.js; do
              code="$(curl --silent --show-error --location --output "/tmp/${asset}" --write-out '%{http_code}' --max-time 30 "${TARGET_URL}/${asset}?v=${GITHUB_RUN_ID}-${attempt}" 2>/dev/null || true)"
              [ "$code" = "200" ] || ready=0
              [ -s "/tmp/${asset}" ] || ready=0
            done
            if [ "$ready" = "1" ]; then
              echo "Owner mobile, reporte smart-v3 y contraste wcag-v1 disponibles en $TARGET_URL"
              exit 0
            fi
            echo "Attempt $attempt: mobile=${marker:-missing} payment=${payment_marker:-missing} dark=${dark_marker:-missing}"
            sleep 10
          done
          echo "Expected owner mobile/payment/dark release was not available."
          exit 1

      - name: Install Chromium
        run: |
          npm install --no-save --ignore-scripts playwright@1.53.0
          npx playwright install --with-deps chromium

      - name: Verify mobile layout without Tailwind CDN
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: node tests/owner-mobile-browser.cjs

      - name: Verify payment report behavior and readability
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: node tests/owner-payment-report-browser.cjs

      - name: Audit complete dark-mode contrast
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: node tests/owner-dark-contrast-browser.cjs

      - name: Upload mobile evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owner-mobile-evidence
          path: |
            owner-mobile-result.json
            owner-mobile-error.txt
            owner-mobile-*.png
            owner-payment-report-result.json
            owner-payment-report-error.txt
            owner-payment-report-mobile.png
            owner-payment-report-live-casa4.png
            owner-dark-contrast-result.json
            owner-dark-contrast-error.txt
            owner-dark-welcome.png
            owner-dark-portal.png
            owner-dark-payment.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish successful production status
        if: success() && github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${TARGET_SHA}" \
            -f state=success \
            -f context='Owner Mobile Production Verification' \
            -f description='Portal móvil, reporte smart-v3 y contraste oscuro wcag-v1 verificados.' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Publish failed production status
        if: failure() && github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${TARGET_SHA}" \
            -f state=failure \
            -f context='Owner Mobile Production Verification' \
            -f description='Falló la verificación móvil, del reporte o del contraste oscuro.' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
