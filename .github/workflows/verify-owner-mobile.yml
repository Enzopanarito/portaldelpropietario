name: Verify Owner Mobile

on:
  pull_request:
    branches: [main]
  workflow_run:
    workflows: ["Deploy Netlify Production"]
    types: [completed]

permissions:
  contents: read
  statuses: write

jobs:
  verify-owner-mobile:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static mobile recovery
        run: |
          node tests/owner-mobile-v2.test.js
          node tests/owner-dark-contrast.test.js

      - name: Validate smart payment report structure
        run: |
          node tests/payment-report-intelligence.test.js
          node tests/payment-report-attachment.test.js
          node tests/owner-payment-report-v3.test.js
          node tests/public-report-payment-smart.test.js

      - name: Resolve target URL
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "url=https://deploy-preview-${{ github.event.pull_request.number }}--villalosapamates.netlify.app" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://villalosapamates.netlify.app" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for preview assets
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            html_code="$(curl --silent --show-error --location --output /tmp/owner.html --write-out '%{http_code}' --max-time 30 "${TARGET_URL}/?owner-release=${GITHUB_RUN_ID}-${attempt}" 2>/dev/null || true)"
            dark_code="$(curl --silent --show-error --location --output /tmp/owner-dark.css --write-out '%{http_code}' --max-time 30 "${TARGET_URL}/owner-dark-contrast-v1.css?v=${GITHUB_RUN_ID}-${attempt}" 2>/dev/null || true)"
            if [ "$html_code" = "200" ] && [ "$dark_code" = "200" ] && grep -q 'Contraste integral modo oscuro wcag-v1' /tmp/owner-dark.css; then
              echo "Preview y capa de contraste disponibles en $TARGET_URL"
              exit 0
            fi
            echo "Attempt $attempt: html=${html_code:-missing} dark=${dark_code:-missing}"
            sleep 10
          done
          echo "La preview o la capa de contraste no estuvieron disponibles."
          exit 1

      - name: Install Chromium
        run: |
          npm install --no-save --ignore-scripts playwright@1.53.0
          npx playwright install --with-deps chromium

      - name: Verify mobile layout without Tailwind CDN
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: node tests/owner-mobile-browser.cjs

      - name: Verify payment report behavior and readability
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: node tests/owner-payment-report-browser.cjs

      - name: Audit complete dark-mode contrast
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: node tests/owner-dark-contrast-browser.cjs

      - name: Upload mobile evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owner-mobile-evidence
          path: |
            owner-mobile-result.json
            owner-mobile-error.txt
            owner-mobile-*.png
            owner-payment-report-result.json
            owner-payment-report-error.txt
            owner-payment-report-mobile.png
            owner-payment-report-live-casa4.png
            owner-dark-contrast-result.json
            owner-dark-contrast-error.txt
            owner-dark-welcome.png
            owner-dark-portal.png
            owner-dark-payment.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish successful production status
        if: success() && github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${TARGET_SHA}" \
            -f state=success \
            -f context='Owner Mobile Production Verification' \
            -f description='Portal móvil, reporte smart-v3 y contraste oscuro wcag-v1 verificados.' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Publish failed production status
        if: failure() && github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${TARGET_SHA}" \
            -f state=failure \
            -f context='Owner Mobile Production Verification' \
            -f description='Falló la verificación móvil, del reporte o del contraste oscuro.' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
