name: Verify Atomic Idempotency

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'netlify/functions/_idempotency_blobs.js'
      - 'netlify/functions/_operation_guard.js'
      - 'netlify/functions/_operation_guard_v3.js'
      - 'netlify/functions/_monthly_close_idempotency.js'
      - 'netlify/functions/admin-manual-payment.js'
      - 'netlify/functions/process-payment-report.js'
      - 'netlify/functions/monthly-close-v2.js'
      - 'tests/idempotency-blobs.test.js'
      - 'tests/idempotency-integration.test.js'
      - 'tests/stage1-security.test.js'
      - '.github/workflows/verify-idempotency-blobs.yml'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'netlify/functions/_idempotency_blobs.js'
      - 'netlify/functions/_operation_guard.js'
      - 'netlify/functions/_operation_guard_v3.js'
      - 'netlify/functions/_monthly_close_idempotency.js'
      - 'netlify/functions/admin-manual-payment.js'
      - 'netlify/functions/process-payment-report.js'
      - 'netlify/functions/monthly-close-v2.js'
      - 'tests/idempotency-blobs.test.js'
      - 'tests/idempotency-integration.test.js'
      - 'tests/stage1-security.test.js'
      - '.github/workflows/verify-idempotency-blobs.yml'

permissions:
  contents: read

jobs:
  verify-atomic-idempotency:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies safely
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Check syntax
        run: |
          node --check netlify/functions/_idempotency_blobs.js
          node --check netlify/functions/_operation_guard_v3.js
          node --check netlify/functions/_monthly_close_idempotency.js
          node --check netlify/functions/admin-manual-payment.js
          node --check netlify/functions/process-payment-report.js
          node --check netlify/functions/monthly-close-v2.js

      - name: Exercise atomic ledger races
        run: node tests/idempotency-blobs.test.js

      - name: Verify integration order and fail-closed contracts
        run: node tests/idempotency-integration.test.js

      - name: Re-run existing concurrent operation protection
        run: node tests/stage1-security.test.js

      - name: Re-run monthly close safety suite
        run: node tests/stage3-monthly-close.test.js
