name: Apply Live Breakdown Fix

on:
  push:
    branches:
      - fix-live-breakdown-browser-v6
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix-live-breakdown-browser-v6

      - name: Patch browser injection safely
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def sub_once(path, pattern, replacement, label, flags=0):
              p = Path(path)
              text = p.read_text()
              updated, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              p.write_text(updated)

          sub_once(
              'netlify/edge-functions/balance-fix.js',
              r"const BREAKDOWN_PRESENTATION = '2026-07-11-photo-v\d+';",
              "const BREAKDOWN_PRESENTATION = '2026-07-11-photo-v6';",
              'breakdown marker'
          )
          sub_once(
              'netlify/edge-functions/balance-fix.js',
              r"return html\.includes\('</body>'\) \? html\.replace\('</body>', injection \+ '</body>'\) : html \+ injection;",
              "return html.includes('</body>') ? html.replace('</body>', () => injection + '</body>') : html + injection;",
              'safe replacement callback'
          )
          sub_once(
              'release.json',
              r'"breakdownPresentation": "2026-07-11-photo-v\d+"',
              '"breakdownPresentation": "2026-07-11-photo-v6"',
              'release marker'
          )
          sub_once(
              'tests/visual-breakdown-v4.test.js',
              r"assert\.strictEqual\(release\.breakdownPresentation, '2026-07-11-photo-v\d+'\);",
              "assert.strictEqual(release.breakdownPresentation, '2026-07-11-photo-v6');",
              'visual test marker'
          )
          sub_once(
              'netlify/edge-functions/pwa-head.js',
              r"^\s*el\.innerHTML='<img src=\"'\+src\+'\" alt=\"BCV\" loading=\"lazy\" referrerpolicy=\"no-referrer\" onerror=.*$",
              "      el.innerHTML='<img src=\"'+src+'\" alt=\"BCV\" loading=\"lazy\" referrerpolicy=\"no-referrer\">';\n      var image=el.querySelector('img');\n      if(image)image.onerror=function(){el.textContent='BCV';};",
              'BCV logo script',
              flags=re.MULTILINE
          )
          PY

      - name: Prove generated scripts are valid
        run: |
          node --input-type=module --check < netlify/edge-functions/balance-fix.js
          node --input-type=module --check < netlify/edge-functions/pwa-head.js
          node tests/injected-browser-scripts.test.js
          node tests/visual-breakdown-v4.test.js

      - name: Stage verified files
        run: |
          mkdir -p patched/netlify/edge-functions patched/tests
          cp netlify/edge-functions/balance-fix.js patched/netlify/edge-functions/
          cp netlify/edge-functions/pwa-head.js patched/netlify/edge-functions/
          cp release.json patched/
          cp tests/visual-breakdown-v4.test.js patched/tests/

      - name: Upload verified functional files
        uses: actions/upload-artifact@v4
        with:
          name: verified-live-breakdown-files
          path: patched
          retention-days: 3
