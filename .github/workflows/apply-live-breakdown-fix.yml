name: Apply Live Breakdown Fix

on:
  push:
    branches:
      - fix-live-breakdown-browser-v6

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix-live-breakdown-browser-v6
          fetch-depth: 0

      - name: Patch browser injection safely
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new, label):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              p.write_text(text.replace(old, new, 1))

          replace_once(
              'netlify/edge-functions/balance-fix.js',
              "const BREAKDOWN_PRESENTATION = '2026-07-11-photo-v5';",
              "const BREAKDOWN_PRESENTATION = '2026-07-11-photo-v6';",
              'breakdown marker'
          )
          replace_once(
              'netlify/edge-functions/balance-fix.js',
              "return html.includes('</body>') ? html.replace('</body>', injection + '</body>') : html + injection;",
              "return html.includes('</body>') ? html.replace('</body>', () => injection + '</body>') : html + injection;",
              'safe replacement callback'
          )
          replace_once(
              'release.json',
              '"breakdownPresentation": "2026-07-11-photo-v5"',
              '"breakdownPresentation": "2026-07-11-photo-v6"',
              'release marker'
          )
          replace_once(
              'tests/visual-breakdown-v4.test.js',
              "assert.strictEqual(release.breakdownPresentation, '2026-07-11-photo-v5');",
              "assert.strictEqual(release.breakdownPresentation, '2026-07-11-photo-v6');",
              'visual test marker'
          )

          pwa = Path('netlify/edge-functions/pwa-head.js')
          text = pwa.read_text()
          old = """      el.innerHTML='<img src="'+src+'" alt="BCV" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentNode.textContent=\\'BCV\\';this.remove();">';"""
          new = """      el.innerHTML='<img src="'+src+'" alt="BCV" loading="lazy" referrerpolicy="no-referrer">';
              var image=el.querySelector('img');
              if(image)image.onerror=function(){el.textContent='BCV';};"""
          if text.count(old) != 1:
              raise SystemExit(f'BCV logo script: expected one match, found {text.count(old)}')
          pwa.write_text(text.replace(old, new, 1))

          validate = Path('.github/workflows/validate.yml')
          text = validate.read_text()
          if 'Validate generated browser scripts' not in text:
              needle = "      - name: Run security and idempotency tests\n"
              insert = "      - name: Validate generated browser scripts\n        run: node tests/injected-browser-scripts.test.js\n\n" + needle
              if text.count(needle) != 1:
                  raise SystemExit('validate workflow insertion point not found exactly once')
              validate.write_text(text.replace(needle, insert, 1))
          PY

      - name: Prove generated scripts are valid
        run: |
          node --input-type=module --check < netlify/edge-functions/balance-fix.js
          node --input-type=module --check < netlify/edge-functions/pwa-head.js
          node tests/injected-browser-scripts.test.js
          node tests/visual-breakdown-v4.test.js

      - name: Remove one-time patch workflow
        run: rm .github/workflows/apply-live-breakdown-fix.yml

      - name: Commit verified fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Corregir ejecución real del desglose en navegador"
          git push origin HEAD:fix-live-breakdown-browser-v6
