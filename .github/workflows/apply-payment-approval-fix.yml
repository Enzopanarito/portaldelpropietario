name: Apply Payment Approval Fix

on:
  push:
    branches:
      - fix-payment-approval-protected-2026-07-11
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix-payment-approval-protected-2026-07-11
          fetch-depth: 0

      - name: Patch payment approval flow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          protected = "async function handleReport(e){const btn=e.target.closest('button');if(!btn||window.vlaReportBusy)return;const id=btn.dataset.id,r=reportes.find(x=>x.id===id);if(!r)return;const approve=btn.classList.contains('confirm-report'),reject=btn.classList.contains('reject-report');if(!approve&&!reject)return;if(reject&&!confirm('¿Rechazar este pago?'))return;const original=btn.textContent;try{window.vlaReportBusy=true;btn.disabled=true;btn.textContent=approve?'Confirmando...':'Rechazando...';const processed=await adminFetch('/.netlify/functions/process-payment-report',{method:'POST',body:JSON.stringify({reportId:id,decision:approve?'approve':'reject'})});toast(processed.message||(approve?'Pago confirmado, recibo procesado y acceso sincronizado.':'Pago rechazado y acceso sincronizado.'));await loadAll(true)}catch(err){toast(err.message,true)}finally{window.vlaReportBusy=false;btn.disabled=false;btn.textContent=original}}"

          admin = Path('admin.html')
          text = admin.read_text()
          pattern = r"async function handleReport\(e\)\{[\s\S]*?\}\nfunction closeRows\(\)"
          updated, count = re.subn(pattern, protected + "\nfunction closeRows()", text, count=1)
          if count != 1:
              raise SystemExit(f'admin.html handleReport: expected one match, found {count}')
          admin.write_text(updated)

          edge = Path('netlify/edge-functions/admin-links.js')
          text = edge.read_text()
          old_pattern = r"  // Confirmar/rechazar reportes siempre debe pasar por backend[\s\S]*?  if \(html\.includes\(rejectOld\)\) html = html\.replace\(rejectOld, rejectNew\);"
          replacement = """  // Confirmar/rechazar reportes siempre debe pasar por backend para crear pago, recibo PDF/correo y sincronizar portón.
  const protectedHandleReport = \""" + protected.replace('\\', '\\\\').replace('"', '\\"') + """\";
  const reportFunctionPattern = /async function handleReport\\(e\\)\\{[\\s\\S]*?\\}\\nfunction closeRows\\(\\)/;
  if (reportFunctionPattern.test(html)) {
    html = html.replace(reportFunctionPattern, protectedHandleReport + \"\\nfunction closeRows()\");
  }"""
          updated, count = re.subn(old_pattern, replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'admin-links report block: expected one match, found {count}')
          updated = updated.replace(
              "  headers.set('content-type', 'text/html; charset=utf-8');",
              "  headers.set('content-type', 'text/html; charset=utf-8');\n  headers.set('x-vla-admin-payment-flow', 'protected-v2');",
              1
          )
          edge.write_text(updated)

          test = Path('tests/final-hardening.test.js')
          text = test.read_text()
          text = text.replace(
              "assert(adminEdge.includes('x-vla-admin-hardening'));",
              "assert(adminEdge.includes('x-vla-admin-hardening'));\nassert(adminEdge.includes('reportFunctionPattern'));\nassert(adminEdge.includes('/.netlify/functions/process-payment-report'));\nassert(!adminEdge.includes('const reportOld'));",
              1
          )
          old_tail = "console.log('FINAL_HARDENING_TESTS_OK');"
          new_tail = r"""(async () => {
  let edgeSource = adminEdge.replace('export default async', 'globalThis.__adminLinksHandler = async');
  const sandbox = { console, Headers, Response, URL };
  vm.createContext(sandbox);
  vm.runInContext(edgeSource, sandbox, { filename: 'admin-links.js' });
  const response = await sandbox.__adminLinksHandler(
    { url: 'https://example.test/admin.html' },
    { next: async () => new Response(adminHtml, { status: 200, headers: { 'content-type': 'text/html; charset=utf-8' } }) }
  );
  const finalHtml = await response.text();
  const start = finalHtml.indexOf('async function handleReport');
  const end = finalHtml.indexOf('function closeRows', start);
  assert(start >= 0 && end > start, 'Debe existir handleReport en el HTML final');
  const handleReport = finalHtml.slice(start, end);
  assert(handleReport.includes('/.netlify/functions/process-payment-report'));
  assert(handleReport.includes("decision:approve?'approve':'reject'"));
  assert(!handleReport.includes('TABLE_PAGOS'));
  assert(!handleReport.includes('TABLE_REPORTES'));
  assert.strictEqual(response.headers.get('x-vla-admin-payment-flow'), 'protected-v2');
  console.log('FINAL_HARDENING_TESTS_OK');
})().catch(error => {
  console.error(error);
  process.exit(1);
});"""
          if old_tail not in text:
              raise SystemExit('final-hardening tail not found')
          test.write_text(text.replace(old_tail, new_tail, 1))
          PY

      - name: Validate patched code
        run: |
          node --input-type=module --check < netlify/edge-functions/admin-links.js
          node tests/final-hardening.test.js
          node tests/stage1-security.test.js

      - name: Commit functional fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin.html netlify/edge-functions/admin-links.js tests/final-hardening.test.js
          git commit -m "Corregir confirmación protegida de pagos reportados"
          git push origin HEAD:fix-payment-approval-protected-2026-07-11
