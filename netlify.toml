[build]
  publish = "."
  functions = "netlify/functions"

[[edge_functions]]
function = "pwa-head"
path = "/*"

[[edge_functions]]
function = "owner-signature"
path = "/"

[[edge_functions]]
function = "owner-signature"
path = "/index.html"

[[edge_functions]]
function = "admin-links"
path = "/admin*"

[[edge_functions]]
function = "admin-monthly-close"
path = "/admin*"

[[edge_functions]]
function = "balance-fix"
path = "/"

[[edge_functions]]
function = "balance-fix"
path = "/index.html"

[[edge_functions]]
function = "balance-fix"
path = "/admin*"

[[headers]]
for = "/*"
  [headers.values]
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()"
  X-Frame-Options = "SAMEORIGIN"
  Cross-Origin-Opener-Policy = "same-origin-allow-popups"
  Cross-Origin-Resource-Policy = "same-site"
  X-DNS-Prefetch-Control = "off"
  X-Permitted-Cross-Domain-Policies = "none"
  Strict-Transport-Security = "max-age=31536000; includeSubDomains"
  Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://upload.wikimedia.org; connect-src 'self'; manifest-src 'self'; worker-src 'self' blob:; upgrade-insecure-requests"

[[headers]]
for = "/.netlify/functions/*"
  [headers.values]
  Cache-Control = "no-store"
  X-Content-Type-Options = "nosniff"

[[headers]]
for = "/service-worker.js"
  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/release.json"
  [headers.values]
  Cache-Control = "no-store, no-cache, must-revalidate"
