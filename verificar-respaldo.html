<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Verificar Respaldo VLA</title><script src="https://cdn.tailwindcss.com"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');body{font-family:Inter,sans-serif}</style>
</head>
<body class="bg-slate-50 text-slate-800">
<main class="max-w-4xl mx-auto p-4 sm:p-8">
<div class="flex justify-between gap-3 mb-6"><a href="/admin.html" class="bg-slate-200 px-4 py-2 rounded-full font-semibold">← Admin</a><a href="/seguridad.html" class="bg-sky-700 text-white px-4 py-2 rounded-full font-semibold">🔐 Seguridad</a></div>
<section class="bg-white rounded-3xl shadow-xl p-6 sm:p-8">
<h1 class="text-3xl font-extrabold mb-2">🧾 Verificar respaldo</h1>
<p class="text-slate-600 mb-6">Selecciona un respaldo JSON descargado desde el Admin. La comprobación ocurre únicamente en este navegador; el archivo no se sube a ningún servidor.</p>
<input id="file" type="file" accept="application/json,.json" class="w-full border rounded-xl p-3 mb-4">
<button id="verify" class="bg-emerald-700 text-white px-5 py-3 rounded-xl font-bold disabled:bg-slate-300">Verificar integridad</button>
<div id="result" class="hidden mt-6"></div>
</section>
</main>
<script>
function canonicalize(value){if(value===null||typeof value!=='object')return value;if(Array.isArray(value))return value.map(canonicalize);const out={};Object.keys(value).sort().forEach(k=>out[k]=canonicalize(value[k]));return out}
function stable(value){return JSON.stringify(canonicalize(value))}
async function sha(value){const bytes=new TextEncoder().encode(typeof value==='string'?value:stable(value));const digest=await crypto.subtle.digest('SHA-256',bytes);return Array.from(new Uint8Array(digest)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
async function verifyBackup(data){const problems=[];if(data?.backupType!=='airtable-full-operational-backup')problems.push('Tipo de respaldo no reconocido.');if(Number(data?.schemaVersion||0)<3)problems.push('El respaldo es de una versión antigua sin manifiesto completo.');const tableRows=[];for(const [name,table] of Object.entries(data?.tables||{})){const records=[...(table?.records||[])].sort((a,b)=>String(a?.id||'').localeCompare(String(b?.id||''))).map(canonicalize);const calculated=await sha(records);const expected=table?.sha256||data?.integrity?.tableHashes?.[name]||'';const ok=calculated===expected;if(!ok)problems.push(`La tabla ${name} no coincide con su hash.`);tableRows.push({name,count:records.length,ok,calculated,expected})}const manifestInput={backupType:data.backupType,schemaVersion:data.schemaVersion,generatedAt:data.generatedAt,baseId:data.baseId,tableCount:data.tableCount,totalRecords:data.totalRecords,tableHashes:data?.integrity?.tableHashes||{}};const manifest=await sha(manifestInput);if(manifest!==data?.integrity?.manifestHash)problems.push('El manifiesto general no coincide.');const copy=JSON.parse(JSON.stringify(data));if(copy.integrity)copy.integrity.fileContentHash=null;const fileHash=await sha(copy);if(fileHash!==data?.integrity?.fileContentHash)problems.push('El hash del contenido completo no coincide.');return{ok:problems.length===0,problems,tableRows,manifest,fileHash}}
document.getElementById('verify').onclick=async()=>{const file=document.getElementById('file').files[0],box=document.getElementById('result'),btn=document.getElementById('verify');if(!file){alert('Selecciona un archivo JSON.');return}try{btn.disabled=true;btn.textContent='Verificando...';const data=JSON.parse(await file.text()),result=await verifyBackup(data);box.classList.remove('hidden');box.innerHTML=`<div class="${result.ok?'bg-green-50 border-green-500 text-green-900':'bg-red-50 border-red-500 text-red-900'} border-l-4 p-4 rounded-xl mb-4"><b>${result.ok?'✅ Respaldo íntegro':'⚠️ Respaldo con diferencias'}</b><p class="text-sm mt-1">${result.ok?'Todos los hashes y cantidades coinciden.':esc(result.problems.join(' | '))}</p></div><div class="overflow-x-auto"><table class="min-w-full text-sm border"><thead class="bg-slate-100"><tr><th class="p-2 text-left">Tabla</th><th class="p-2 text-right">Registros</th><th class="p-2">Estado</th></tr></thead><tbody>${result.tableRows.map(r=>`<tr><td class="p-2 border">${esc(r.name)}</td><td class="p-2 border text-right">${r.count}</td><td class="p-2 border text-center">${r.ok?'✅':'❌'}</td></tr>`).join('')}</tbody></table></div>`}catch(error){box.classList.remove('hidden');box.innerHTML=`<div class="bg-red-50 border-l-4 border-red-500 text-red-900 p-4 rounded-xl"><b>No se pudo verificar.</b><p class="text-sm mt-1">${esc(error.message)}</p></div>`}finally{btn.disabled=false;btn.textContent='Verificar integridad'}}
</script>
</body></html>
